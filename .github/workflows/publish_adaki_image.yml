name: Publish Adaki image to GHCR

# Publica la imagen del fork en GitHub Container Registry, que es de donde
# Coolify la va a tirar. Usa GITHUB_TOKEN, así que no hace falta configurar
# ningún secreto extra.
#
# Nota: NO se hace checkout de submódulos a propósito. El repo referencia un
# commit de evolution-manager-v2 que upstream borró al mover de organización,
# así que `submodules: recursive` falla. El Dockerfile no lo necesita: copia
# `./manager`, que ya está versionado.

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_push:
    name: Build and push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
